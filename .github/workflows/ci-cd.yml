name: Microservices Scaling CI-CD pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions: 
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check docker compose config
        run: docker compose config

      - name: Start Docker compose stack
        run: docker compose up -d --build --scale backend=3

      - name: Check running containers
        run: docker ps

      - name: Wait for sometime
        run: sleep 15
  
      - name: Verify main endpoint
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost/; then
              echo "Successfully verified.."
              exit 0
            fi
            echo "Main endpoint verification underway.."
            sleep 3
          done
          echo "Test Failed.."
          exit 1

      - name: Verify load balancing(fav part)
        run: |
          responses=$(for i in {1..10};do curl -s http://localhost/; done)
          echo "$responses"
          unique=$(echo "$responses" | grep -o 'backend-[0-9]' | sort -u | wc -l) 

          if [ "$unique" -ge 2 ]; then 
            echo "Load balancing working perfect.."
            exit 0
          fi
          echo "Load balancing verification failed.."
          exit 1

      - name: Verify container health
        run: |
          docker ps
          docker inspect $(docker ps -q)

      - name: Show compose logs
        if: always()
        run: docker compose logs

      - name: Shutdown docker compose stack
        if: always()
        run: docker compose down

  build-and-push:
   runs-on: ubuntu-latest
   needs: integration-test
   
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4

     - name: Docker login
       run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

     - name: Setup Tag
       id: vars
       run: echo "TAG=${{ github.sha }}">>$GITHUB_OUTPUT

     - name: Build backend image
       run: |
         docker build \
         -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
         -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.vars.outputs.TAG }} ./backend

     - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest 
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.vars.outputs.TAG }}
